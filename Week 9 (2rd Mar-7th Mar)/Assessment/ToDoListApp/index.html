<!DOCTYPE html>
<html>
<head>
<title>To-Do List</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#6a11cb,#2575fc);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.container{
    background:white;
    width:380px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

h2{
    margin-bottom:20px;
    color:#333;
}

input{
    padding:10px;
    width:65%;
    border:1px solid #ccc;
    border-radius:6px;
    outline:none;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.addBtn{
    background:#28a745;
    color:white;
}

.resetBtn{
    background:#dc3545;
    color:white;
}

button:hover{
    opacity:0.85;
}

ul{
    list-style:none;
    padding:0;
    margin-top:20px;
}

li{
    background:#f8f9fa;
    border-left:5px solid #2575fc;
    padding:10px;
    margin-top:8px;
    border-radius:6px;
    cursor:pointer;
    transition:0.2s;
}

li:hover{
    transform:scale(1.02);
    background:#eef3ff;
}

.done{
    text-decoration:line-through;
    color:gray;
    border-left:5px solid #28a745;
}

</style>
</head>

<body>

<div class="container">

<h2>My To-Do List</h2>

<input type="text" id="taskInput" placeholder="Enter a task">
<button class="addBtn" onclick="addTask()">Add</button>
<button class="resetBtn" onclick="clearTasks()">Reset</button>

<ul id="taskList"></ul>

</div>

<script>

function addTask(){

    let input = document.getElementById("taskInput");
    let taskText = input.value.trim();

    if(taskText === "") return;

    let li = document.createElement("li");
    li.textContent = taskText;

    li.onclick = function(){
        li.classList.toggle("done");
    };

    document.getElementById("taskList").appendChild(li);

    input.value = "";
}

function clearTasks(){
    document.getElementById("taskList").innerHTML="";
}

</script>

</body>
</html>
