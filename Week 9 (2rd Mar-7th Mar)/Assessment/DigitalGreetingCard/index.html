<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Greeting Card</title>

<style>
body{
    background: linear-gradient(to right, pink, lightblue, yellow);
    font-family: "Comic Sans MS", cursive;
    text-align: center;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card{
    background: white;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

h1{
    color: #ff4081;
}

button{
    padding: 10px 20px;
    font-size: 16px;
    background-color: orange;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover{
    background-color: darkorange;
}

#surprise{
    margin-top: 20px;
    font-size: 18px;
    color: green;
    display: none;
}
</style>

</head>

<body>

<div class="card">
    <h1>Happy Birthday!</h1>
    <p>May your day be filled with happiness and cake!</p>

    <button onclick="showMessage()">Click for Surprise 🎁</button>

    <p id="surprise">Wishing you lots of joy!</p>
</div>

<script>
function showMessage(){
    document.getElementById("surprise").style.display = "block";
}
</script>

</body>
</html>
