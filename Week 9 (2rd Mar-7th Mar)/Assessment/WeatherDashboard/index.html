<!DOCTYPE html>
<html>
<head>
<title>Weather Dashboard</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.container{
    background:white;
    width:350px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

h2{
    margin-bottom:15px;
}

input{
    padding:10px;
    width:65%;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:6px;
    background:#007bff;
    color:white;
    cursor:pointer;
}

button:hover{
    opacity:0.85;
}

.weatherCard{
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    background:#f5f5f5;
}

.icon{
    font-size:40px;
}

</style>
</head>

<body>

<div class="container">

<h2>Weather Today</h2>

<input type="text" id="cityInput" placeholder="Enter city">
<button onclick="checkWeather()">Check Weather</button>

<div class="weatherCard" id="weatherDisplay">
<p>Enter a city to see weather</p>
</div>

</div>

<script>

function checkWeather(){

    let city=document.getElementById("cityInput").value.toLowerCase();
    let display=document.getElementById("weatherDisplay");

    let temp;
    let condition;
    let icon;

    if(city==="paris"){
        temp="22°C";
        condition="Sunny";
        icon="☀";
        document.body.style.background="linear-gradient(135deg,#fddb92,#fbc531)";
    }
    else if(city==="london"){
        temp="18°C";
        condition="Rainy";
        icon="🌧";
        document.body.style.background="linear-gradient(135deg,#4facfe,#6dd5ed)";
    }
    else if(city==="tokyo"){
        temp="20°C";
        condition="Cloudy";
        icon="☁";
        document.body.style.background="linear-gradient(135deg,#bdc3c7,#2c3e50)";
    }
    else{
        display.innerHTML="City not found in mock data";
        return;
    }

    display.innerHTML=
    "<div class='icon'>"+icon+"</div>"+
    "<h3>City: "+city.charAt(0).toUpperCase()+city.slice(1)+"</h3>"+
    "<p>Temperature: "+temp+"</p>"+
    "<p>Condition: "+condition+"</p>";

}

</script>

</body>
</html>
